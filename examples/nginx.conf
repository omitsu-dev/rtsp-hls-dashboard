server {
    listen 8080;
    server_name _;

    # HLS segments — static files
    location /hls/ {
        alias /var/www/hls/;
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin "*";
    }

    # Dashboard UI — static HTML
    location / {
        root /opt/rtsp-hls-dashboard/public;
        index index.html;
    }

    # Status API — reverse proxy to Node.js
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
    }
}
